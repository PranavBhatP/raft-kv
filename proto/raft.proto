syntax = "proto3";
option go_package = "github.com/PranavBhatP/raft-kv/proto";  

package raft;

service RaftService {
    rpc RequestVote (VoteRequest) returns (VoteResponse);
    rpc AppendEntries (AppendRequest) returns (AppendResponse);

    rpc Put(PutRequest) returns (PutResponse);
    rpc Get(GetRequest) returns (GetResponse);
}

message VoteRequest {
    int64 term=1;
    int32 candidateId=2;
    int64 lastLogIndex=3;
    int64 lastLogTerm=4;
}

message VoteResponse {
    int64 term=1;
    bool voteGranted=2;
}

message LogEntry {
    int64 term=1;
    string command=2;
}

message AppendRequest{
    int64 term=1;
    int32 leaderId=2;
    int64 prevLogIndex=3;
    int64 prevLogTerm=4;
    repeated LogEntry entries=5;
    int64 leaderCommit=6;
}

message AppendResponse{
    int64 term=1;
    bool success=2;
}

// client API
message PutRequest {
    string key = 1;
    string value = 2;
}

message PutResponse {
    bool success = 1;
    int32 leaderId = 2; //redirect to leader in case of wrong address.
}

message GetRequest {
    string key = 1;
}

message GetResponse {
    bool success = 1;
    string value = 2;
    int32 leaderId = 3;
}